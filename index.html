<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor de Idiomas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e2e8f0;font-family:sans-serif;height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#1a1d27}
    ::-webkit-scrollbar-thumb{background:#3d4166;border-radius:3px}
    input{outline:none}
    button{cursor:pointer}
    details>summary{list-style:none}
    details>summary::-webkit-details-marker{display:none}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ⚠️ REEMPLAZÁ ESTO CON TU API KEY DE ANTHROPIC
const API_KEY = "Marie7";

const IDIOMAS = {
  ingles:    { nombre: "Inglés",    flag: "🇺🇸", lang: "en-US" },
  italiano:  { nombre: "Italiano",  flag: "🇮🇹", lang: "it-IT" },
  frances:   { nombre: "Francés",   flag: "🇫🇷", lang: "fr-FR" },
  aleman:    { nombre: "Alemán",    flag: "🇩🇪", lang: "de-DE" },
  portugues: { nombre: "Portugués", flag: "🇵🇹", lang: "pt-PT" },
  japones:   { nombre: "Japonés",   flag: "🇯🇵", lang: "ja-JP" },
  chino:     { nombre: "Chino",     flag: "🇨🇳", lang: "zh-CN" },
  arabe:     { nombre: "Árabe",     flag: "🇸🇦", lang: "ar-SA" },
  catalan:   { nombre: "Catalán",   flag: "🏴",  lang: "ca-ES" },
};

const FRASES = {
  ingles:    ["Hi! How are you?", "¿Cómo se dice 'disculpe'?", "Quiero practicar una entrevista", "Enséñame vocabulario de viajes"],
  italiano:  ["Ciao! Come stai?", "¿Cómo se dice 'gracias'?", "Quiero pedir comida en un restaurante", "Enséñame a presentarme"],
  frances:   ["Bonjour! Comment ça va?", "¿Cómo se dice 'por favor'?", "Quiero practicar el acento", "Enséñame saludos formales"],
  aleman:    ["Hallo! Wie geht's?", "¿Cómo se dice 'disculpa'?", "Quiero aprender números", "Enséñame a pedir en un café"],
  portugues: ["Olá! Tudo bem?", "¿Cómo se dice 'gracias'?", "Quiero practicar para viajar a Brasil", "Enséñame expresiones cotidianas"],
  japones:   ["こんにちは！", "¿Cómo se escribe 'gracias'?", "Quiero aprender Hiragana", "Enséñame a presentarme en japonés"],
  chino:     ["你好！", "¿Cómo se dice 'gracias' en chino?", "Quiero aprender los tonos", "Enséñame números del 1 al 10"],
  arabe:     ["مرحبا!", "¿Cómo se escribe el alfabeto?", "Quiero aprender saludos básicos", "Enséñame a presentarme"],
  catalan:   ["Hola! Com estàs?", "¿Cómo se dice 'por favor'?", "Quiero practicar conversación básica", "Enséñame expresiones catalanas"],
};

const METAS = [
  { id:1,  texto:"Dominar saludos y presentaciones",   pts:100 },
  { id:2,  texto:"Verbos en presente simple",          pts:150 },
  { id:3,  texto:"Vocabulario de trabajo y oficina",   pts:120 },
  { id:4,  texto:"Hacer preguntas correctamente",      pts:130 },
  { id:5,  texto:"Hablar sobre rutinas diarias",       pts:110 },
  { id:6,  texto:"Expresar gustos y preferencias",     pts:120 },
  { id:7,  texto:"Tiempo pasado",                      pts:200 },
  { id:8,  texto:"Vocabulario de viajes y turismo",    pts:130 },
  { id:9,  texto:"Expresiones idiomáticas comunes",    pts:180 },
  { id:10, texto:"Pronunciación de sonidos difíciles", pts:160 },
  { id:11, texto:"Idioma para situaciones sociales",   pts:140 },
  { id:12, texto:"Conectores y fluidez al hablar",     pts:170 },
];

const RANGOS = [
  { nombre:"Novato",      min:0,    max:299,      color:"#6b7280", emoji:"🥚" },
  { nombre:"Aprendiz",   min:300,  max:699,      color:"#10b981", emoji:"🌱" },
  { nombre:"Estudiante", min:700,  max:1299,     color:"#3b82f6", emoji:"📘" },
  { nombre:"Practicante",min:1300, max:2099,     color:"#8b5cf6", emoji:"⚡" },
  { nombre:"Experto",    min:2100, max:3199,     color:"#f59e0b", emoji:"🌟" },
  { nombre:"Maestro",    min:3200, max:Infinity, color:"#ef4444", emoji:"👑" },
];

const LOGROS = [
  { id:"primera_meta", emoji:"🎯", nombre:"Primera meta",     desc:"Completaste tu primera meta",        cond:s=>s.metasOk>=1 },
  { id:"tres_metas",   emoji:"🏅", nombre:"Dedicado",         desc:"Completaste 3 metas",                cond:s=>s.metasOk>=3 },
  { id:"seis_metas",   emoji:"🏆", nombre:"Imparable",        desc:"Completaste 6 metas",                cond:s=>s.metasOk>=6 },
  { id:"todas_metas",  emoji:"👑", nombre:"Maestro completo", desc:"Completaste todas las metas",        cond:s=>s.metasOk>=12 },
  { id:"vocab_10",     emoji:"📖", nombre:"Curioso",          desc:"Aprendiste 10 palabras nuevas",      cond:s=>s.vocab>=10 },
  { id:"vocab_30",     emoji:"📚", nombre:"Lector voraz",     desc:"Aprendiste 30 palabras nuevas",      cond:s=>s.vocab>=30 },
  { id:"pts_300",      emoji:"⭐", nombre:"Acumulador",       desc:"Alcanzaste 300 puntos",              cond:s=>s.puntos>=300 },
  { id:"pts_1000",     emoji:"🌟", nombre:"Mil puntos",       desc:"Alcanzaste 1000 puntos",             cond:s=>s.puntos>=1000 },
  { id:"racha_5",      emoji:"🔥", nombre:"En llamas",        desc:"5 respuestas correctas seguidas",   cond:s=>s.racha>=5 },
  { id:"racha_10",     emoji:"💥", nombre:"Imparable",        desc:"10 respuestas correctas seguidas",  cond:s=>s.racha>=10 },
];

const getRango = pts => RANGOS.find(r => pts>=r.min && pts<=r.max) || RANGOS[0];
const getNext  = pts => { const i=RANGOS.findIndex(r=>pts>=r.min&&pts<=r.max); return RANGOS[i+1]||null; };
const estadoBase = () => ({ puntos:0, totalMsg:0, racha:0, vocab:[], metas:METAS.map(m=>({...m,completada:false})), logros:[], mensajes:[] });

const esRepetido = (txt, hist=[]) => {
  const n = t => t.toLowerCase().trim().replace(/\s+/g," ");
  const a = n(txt);
  return hist.slice(-5).some(m => {
    if(m.de!=="usuario") return false;
    const b = n(m.texto);
    if(a===b) return true;
    const sa=new Set(a.split(" ")), sb=new Set(b.split(" "));
    const com=[...sa].filter(p=>sb.has(p)).length;
    return com/Math.max(sa.size,sb.size)>0.8;
  });
};

function Celebracion({texto,puntos,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
      <div style={{textAlign:"center",animation:"fadeIn 0.3s ease"}}>
        <div style={{fontSize:"3rem",marginBottom:"8px"}}>🎉</div>
        <div style={{color:"white",fontWeight:"bold",fontSize:"1rem",padding:"12px 24px",borderRadius:"16px",background:"linear-gradient(135deg,#4f46e5,#7c3aed)"}}>{texto}</div>
        {puntos>0 && <div style={{marginTop:"8px",color:"#facc15",fontWeight:"bold",fontSize:"1.1rem"}}>+{puntos} XP ✨</div>}
      </div>
    </div>
  );
}

function BarraXP({puntos}){
  const r=getRango(puntos), nx=getNext(puntos);
  const pct=nx?Math.round(((puntos-r.min)/(nx.min-r.min))*100):100;
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
        <span style={{fontSize:"0.75rem",fontWeight:"bold",color:r.color}}>{r.emoji} {r.nombre}</span>
        {nx&&<span style={{fontSize:"0.75rem",color:"#9ca3af"}}>{puntos}/{nx.min} XP</span>}
      </div>
      <div style={{background:"#2d3148",borderRadius:"999px",height:"8px"}}>
        <div style={{height:"8px",borderRadius:"999px",width:`${pct}%`,background:`linear-gradient(90deg,${r.color},#818cf8)`,transition:"width 0.7s"}}/>
      </div>
    </div>
  );
}

function App(){
  const [idioma,setIdioma]=useState("ingles");
  const [est,setEst]=useState(null);
  const [msg,setMsg]=useState("");
  const [cargando,setCargando]=useState(false);
  const [leccion,setLeccion]=useState(false);
  const [feedback,setFeedback]=useState(null);
  const [escucha,setEscucha]=useState(false);
  const [hayVoz,setHayVoz]=useState(false);
  const [hablaId,setHablaId]=useState(null);
  const [celebra,setCelebra]=useState(null);
  const [tab,setTab]=useState("metas");
  const [guardando,setGuardando]=useState(false);
  const [guardadoOk,setGuardadoOk]=useState(false);
  const [cargandoDatos,setCargandoDatos]=useState(true);
  const [avisoRep,setAvisoRep]=useState(false);
  const endRef=useRef(null);
  const recRef=useRef(null);
  const timerRef=useRef(null);

  // Cargar desde localStorage
  useEffect(()=>{
    try{
      const raw=localStorage.getItem("tutor_v3");
      if(raw){
        const datos=JSON.parse(raw);
        const completo=Object.fromEntries(Object.keys(IDIOMAS).map(k=>[k,
          datos[k]?{...estadoBase(),puntos:datos[k].puntos??0,totalMsg:datos[k].totalMsg??0,racha:datos[k].racha??0,vocab:datos[k].vocab??[],metas:datos[k].metas??estadoBase().metas,logros:datos[k].logros??[],mensajes:[]}:estadoBase()
        ]));
        setEst(completo);
      } else {
        setEst(Object.fromEntries(Object.keys(IDIOMAS).map(k=>[k,estadoBase()])));
      }
    }catch(e){
      setEst(Object.fromEntries(Object.keys(IDIOMAS).map(k=>[k,estadoBase()])));
    }finally{setCargandoDatos(false);}
  },[]);

  // Guardar en localStorage
  useEffect(()=>{
    if(!est) return;
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>{
      setGuardando(true);
      try{
        const data=Object.fromEntries(Object.keys(IDIOMAS).map(k=>[k,{puntos:est[k].puntos,totalMsg:est[k].totalMsg,racha:est[k].racha,vocab:est[k].vocab,metas:est[k].metas,logros:est[k].logros}]));
        localStorage.setItem("tutor_v3",JSON.stringify(data));
        setGuardadoOk(true);
      }catch(e){}finally{setGuardando(false);}
    },1500);
    return()=>clearTimeout(timerRef.current);
  },[est]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[est?.[idioma]?.mensajes]);

  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){
      setHayVoz(true);
      const r=new SR();
      r.lang="es-AR";r.continuous=false;r.interimResults=false;
      r.onresult=e=>{setMsg(e.results[0][0].transcript);setEscucha(false);};
      r.onend=()=>setEscucha(false);
      r.onerror=()=>setEscucha(false);
      recRef.current=r;
    }
  },[]);

  const updEst=fn=>setEst(prev=>({...prev,[idioma]:fn(prev[idioma])}));

  // Logros
  useEffect(()=>{
    if(!est) return;
    const e=est[idioma];
    const s={metasOk:e.metas.filter(m=>m.completada).length,vocab:e.vocab.length,puntos:e.puntos,racha:e.racha};
    const nuevos=LOGROS.filter(l=>!e.logros.includes(l.id)&&l.cond(s));
    if(nuevos.length>0){
      updEst(prev=>({...prev,logros:[...prev.logros,...nuevos.map(l=>l.id)]}));
      setCelebra({texto:`¡Logro! ${nuevos[0].emoji} ${nuevos[0].nombre}`,puntos:0});
    }
  },[est?.[idioma]?.puntos,est?.[idioma]?.racha,est?.[idioma]?.metas]);

  const toggleMic=()=>{
    if(!recRef.current) return;
    if(escucha){recRef.current.stop();setEscucha(false);}
    else{recRef.current.start();setEscucha(true);}
  };

  const hablar=(txt,id)=>{
    if(hablaId===id){window.speechSynthesis.cancel();setHablaId(null);return;}
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang=IDIOMAS[idioma].lang;u.rate=0.85;
    const vs=window.speechSynthesis.getVoices();
    const v=vs.find(x=>x.lang.startsWith(IDIOMAS[idioma].lang.split("-")[0]));
    if(v) u.voice=v;
    u.onend=()=>setHablaId(null);
    setHablaId(id);
    window.speechSynthesis.speak(u);
  };

  const cambiar=k=>{window.speechSynthesis.cancel();setHablaId(null);setIdioma(k);setFeedback(null);setMsg("");setAvisoRep(false);};

  const enviar=async(override)=>{
    const txt=override||msg;
    if(!txt.trim()||cargando) return;
    const e=est[idioma];
    if(esRepetido(txt,e.mensajes)){setAvisoRep(true);setTimeout(()=>setAvisoRep(false),3000);setMsg("");return;}
    const uMsg={id:Date.now(),texto:txt,de:"usuario",hora:new Date()};
    updEst(prev=>({...prev,mensajes:[...prev.mensajes,uMsg],totalMsg:prev.totalMsg+1}));
    setMsg("");setCargando(true);setAvisoRep(false);
    const inf=IDIOMAS[idioma];
    const hist=[...e.mensajes,uMsg].slice(-6).map(m=>({de:m.de,texto:m.texto}));
    const pend=e.metas.filter(m=>!m.completada).map(m=>`ID${m.id}:${m.texto}`).join(", ");
    const prompt=`Eres un tutor de ${inf.nombre} amigable para hispanohablantes argentinos.
Idioma: ${inf.nombre}
Historial: ${JSON.stringify(hist)}
Mensaje: "${txt}"
Modo lección: ${leccion}
Metas pendientes: ${pend}

Respondé SOLO con JSON válido:
{
  "respuesta": "Respuesta en ${inf.nombre}${leccion?" con foco didáctico":" conversacional"}. Si el usuario escribió en español, explicá en español también.",
  "feedback": {"positivo":"Elogio corto en español o vacío","correccion":"Corrección gentil en español o vacío","sugerencia":"Sugerencia práctica en español"},
  "vocabularioNuevo": ["palabras"],
  "correcto": true,
  "tieneValorEducativo": true,
  "metaCompletadaId": null
}
REGLAS:
- metaCompletadaId: ID de la meta si el usuario usó correctamente ese tema en 2+ intercambios. No hace falta perfección, alcanza con lo básico. Si no, null.
- tieneValorEducativo: false solo si es spam claro o sin sentido.
- correcto: false solo si hay errores graves.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const data=await res.json();
      const raw=data.content.map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
      const p=JSON.parse(raw);
      const tMsg={id:Date.now()+1,texto:p.respuesta,de:"tutor",hora:new Date()};
      let pts=0, meta=null;
      const nRacha=p.correcto!==false&&p.tieneValorEducativo!==false?e.racha+1:0;
      if(p.metaCompletadaId){
        const m=e.metas.find(x=>x.id===p.metaCompletadaId&&!x.completada);
        if(m){meta=m;pts+=m.pts;setCelebra({texto:`¡Meta completada! 🎯 ${m.texto}`,puntos:m.pts});}
      }
      if(p.tieneValorEducativo!==false&&p.correcto!==false&&nRacha>0&&nRacha%5===0&&!meta){
        pts+=20;setCelebra({texto:`🔥 ¡5 respuestas correctas seguidas!`,puntos:20});
      }
      updEst(prev=>({...prev,
        mensajes:[...prev.mensajes,tMsg],
        vocab:[...new Set([...prev.vocab,...(p.vocabularioNuevo||[])])],
        racha:nRacha,puntos:prev.puntos+pts,
        metas:meta?prev.metas.map(m=>m.id===meta.id?{...m,completada:true}:m):prev.metas
      }));
      setFeedback(p.feedback);
      setTimeout(()=>hablar(p.respuesta,tMsg.id),300);
    }catch(err){
      updEst(prev=>({...prev,mensajes:[...prev.mensajes,{id:Date.now()+1,texto:"Lo siento, hubo un error. ¡Sigamos! 😊",de:"tutor",hora:new Date()}]}));
    }finally{setCargando(false);}
  };

  if(cargandoDatos) return (
    <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",background:"#0f1117"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:"3rem",marginBottom:"12px"}}>📚</div>
        <p style={{color:"#9ca3af"}}>Cargando tu progreso...</p>
      </div>
    </div>
  );

  const e=est[idioma], rng=getRango(e.puntos), metasOk=e.metas.filter(m=>m.completada).length, logrosOk=e.logros.length, idm=IDIOMAS[idioma];
  const col=(c,bg,b)=>({background:c?bg:"transparent",border:`1px solid ${c?b:"transparent"}`,color:"#e2e8f0",padding:"6px 8px",borderRadius:"8px",cursor:"pointer",display:"flex",alignItems:"center",gap:"6px",textAlign:"left",width:"100%",fontSize:"0.75rem"});

  return (
    <div style={{display:"flex",height:"100vh",background:"#0f1117",color:"#e2e8f0",overflow:"hidden"}}>
      {celebra&&<Celebracion texto={celebra.texto} puntos={celebra.puntos} onDone={()=>setCelebra(null)}/>}

      {/* CHAT */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        {/* Header */}
        <div style={{background:"#1a1d27",borderBottom:"1px solid #2d3148",padding:"10px 14px",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px",flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
              <span style={{fontWeight:"bold",color:"white",fontSize:"0.9rem"}}>📚 Tutor de Idiomas</span>
              <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                {Object.entries(IDIOMAS).map(([k,v])=>{
                  const r=getRango(est[k].puntos);
                  return <button key={k} onClick={()=>cambiar(k)} style={{background:idioma===k?"#4f46e5":"#252836",border:`1px solid ${idioma===k?"#6366f1":"#3d4166"}`,color:"#e2e8f0",padding:"4px 8px",borderRadius:"8px",fontSize:"0.75rem",cursor:"pointer",display:"flex",alignItems:"center",gap:"4px"}}>
                    {v.flag} {v.nombre} {est[k].puntos>0&&<span style={{color:r.color}}>{r.emoji}</span>}
                  </button>;
                })}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"0.7rem",color:guardando?"#f59e0b":"#10b981"}}>💾 {guardando?"Guardando...":guardadoOk?"Guardado ✓":""}</span>
              {e.racha>=2&&<span style={{fontSize:"0.75rem",color:"#fb923c"}}>🔥{e.racha}</span>}
              {hayVoz&&<span style={{fontSize:"0.75rem",color:"#4ade80"}}>🔊 Voz</span>}
              <button onClick={()=>setLeccion(!leccion)} style={{background:leccion?"#4f46e5":"#252836",border:"1px solid #3d4166",color:"#e2e8f0",padding:"4px 12px",borderRadius:"8px",fontSize:"0.75rem"}}>
                {leccion?"📚 Lección":"💬 Chat"}
              </button>
            </div>
          </div>
        </div>

        {/* Mensajes */}
        <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:"12px"}}>
          {e.mensajes.length===0&&(
            <div style={{textAlign:"center",paddingTop:"40px"}}>
              <div style={{fontSize:"3.5rem",marginBottom:"12px"}}>{idm.flag}</div>
              <h2 style={{color:"white",fontSize:"1.3rem",fontWeight:"bold",marginBottom:"6px"}}>¡Aprendamos {idm.nombre}!</h2>
              <p style={{color:"#9ca3af",fontSize:"0.875rem",marginBottom:"4px"}}>Ganás puntos completando metas reales 🎯</p>
              <p style={{color:"#6b7280",fontSize:"0.8rem",marginBottom:"20px"}}>La IA detecta cuando dominás un tema</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center"}}>
                {(FRASES[idioma]||[]).map(f=><button key={f} onClick={()=>enviar(f)} style={{background:"#252836",border:"1px solid #3d4166",color:"#d1d5db",padding:"6px 14px",borderRadius:"999px",fontSize:"0.85rem"}}>{f}</button>)}
              </div>
            </div>
          )}
          {e.mensajes.map(m=>(
            <div key={m.id} style={{display:"flex",justifyContent:m.de==="usuario"?"flex-end":"flex-start"}}>
              {m.de==="tutor"&&<div style={{width:"32px",height:"32px",borderRadius:"50%",background:"#4338ca",display:"flex",alignItems:"center",justifyContent:"center",marginRight:"8px",flexShrink:0,marginTop:"4px"}}>{idm.flag}</div>}
              <div style={{maxWidth:"420px",padding:"12px 16px",background:m.de==="usuario"?"#4f46e5":"#1a1d27",border:m.de==="tutor"?"1px solid #2d3148":"none",borderRadius:m.de==="usuario"?"1rem 1rem 0.25rem 1rem":"1rem 1rem 1rem 0.25rem"}}>
                <p style={{fontSize:"0.875rem",lineHeight:"1.5",whiteSpace:"pre-wrap"}}>{m.texto}</p>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"6px",gap:"8px"}}>
                  <span style={{fontSize:"0.7rem",color:m.de==="usuario"?"#a5b4fc":"#4a5568"}}>{new Date(m.hora).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
                  {m.de==="tutor"&&<button onClick={()=>hablar(m.texto,m.id)} style={{background:"none",border:"none",color:hablaId===m.id?"#818cf8":"#4a5568",fontSize:"0.7rem",cursor:"pointer"}}>
                    🔊 {hablaId===m.id?"Detener":"Escuchar"}
                  </button>}
                </div>
              </div>
            </div>
          ))}
          {cargando&&(
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"#4338ca",display:"flex",alignItems:"center",justifyContent:"center"}}>{idm.flag}</div>
              <div style={{background:"#1a1d27",border:"1px solid #2d3148",padding:"12px 16px",borderRadius:"1rem",display:"flex",gap:"4px"}}>
                {[0,150,300].map((d,i)=><div key={i} style={{width:"8px",height:"8px",background:"#818cf8",borderRadius:"50%",animation:`bounce 1s ${d}ms infinite`}}/>)}
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>

        {/* Input */}
        <div style={{background:"#1a1d27",borderTop:"1px solid #2d3148",padding:"14px",flexShrink:0}}>
          {escucha&&<div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"8px"}}><div style={{width:"8px",height:"8px",background:"#ef4444",borderRadius:"50%"}}/><span style={{fontSize:"0.75rem",color:"#f87171"}}>Escuchando...</span></div>}
          {avisoRep&&<div style={{marginBottom:"8px",padding:"8px 12px",borderRadius:"8px",fontSize:"0.75rem",color:"#fde68a",background:"#2b2200",border:"1px solid #4a3800"}}>⚠️ Ya enviaste algo similar. ¡Intentá algo diferente!</div>}
          <div style={{display:"flex",gap:"8px"}}>
            {hayVoz&&<button onClick={toggleMic} style={{background:escucha?"#7c3aed":"#252836",border:"1px solid #3d4166",color:"white",padding:"10px 14px",borderRadius:"12px",fontSize:"1.1rem"}}>
              {escucha?"🔇":"🎙️"}
            </button>}
            <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&enviar()}
              placeholder={`Escribí en español o en ${idm.nombre}...`} disabled={cargando}
              style={{flex:1,background:"#252836",border:"1px solid #3d4166",color:"#e2e8f0",padding:"10px 16px",borderRadius:"12px",fontSize:"0.875rem"}}/>
            <button onClick={()=>enviar()} disabled={cargando||!msg.trim()} style={{background:cargando||!msg.trim()?"#252836":"#4f46e5",border:"none",color:"white",padding:"10px 16px",borderRadius:"12px",fontSize:"1.1rem",opacity:cargando||!msg.trim()?0.5:1}}>➤</button>
          </div>
        </div>
      </div>

      {/* SIDEBAR */}
      <div style={{background:"#1a1d27",borderLeft:"1px solid #2d3148",width:"290px",display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden"}}>
        {/* XP */}
        <div style={{background:"linear-gradient(135deg,#1a1d27,#1e1b3a)",borderBottom:"1px solid #2d3148",padding:"14px",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
            <span style={{fontSize:"1.2rem"}}>{idm.flag}</span>
            <span style={{fontWeight:"bold",color:"white",fontSize:"0.875rem"}}>{idm.nombre}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"1.5rem"}}>{rng.emoji}</span>
              <span style={{fontWeight:"bold",color:rng.color,fontSize:"0.875rem"}}>{rng.nombre}</span>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"1.5rem",fontWeight:"bold",color:"#facc15"}}>{e.puntos}</div>
              <div style={{fontSize:"0.7rem",color:"#9ca3af"}}>XP</div>
            </div>
          </div>
          <BarraXP puntos={e.puntos}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginTop:"10px",textAlign:"center"}}>
            {[["💬",e.totalMsg,"Msgs"],["📚",e.vocab.length,"Palabras"],["🔥",e.racha,"Racha"]].map(([ic,v,lb])=>(
              <div key={lb} style={{background:"#252836",border:"1px solid #2d3148",padding:"6px",borderRadius:"8px"}}>
                <div style={{fontSize:"0.9rem"}}>{ic}</div>
                <div style={{fontWeight:"bold",color:"white",fontSize:"0.875rem"}}>{v}</div>
                <div style={{fontSize:"0.7rem",color:"#6b7280"}}>{lb}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:"10px",paddingTop:"8px",borderTop:"1px solid #2d3148",fontSize:"0.7rem",color:"#6b7280"}}>
            <p style={{color:"#9ca3af",fontWeight:"600",marginBottom:"4px"}}>¿Cómo ganar XP?</p>
            <p>🎯 Completar una meta → puntos de esa meta</p>
            <p>🔥 5 respuestas correctas → +20 XP</p>
          </div>
        </div>

        {/* Todos los idiomas */}
        <details style={{borderBottom:"1px solid #2d3148",flexShrink:0}}>
          <summary style={{padding:"10px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:"#9ca3af",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.05em"}}>
            Todos tus idiomas <span>▼</span>
          </summary>
          <div style={{padding:"0 10px 10px",display:"flex",flexDirection:"column",gap:"3px"}}>
            {Object.entries(IDIOMAS).map(([k,v])=>{
              const r=getRango(est[k].puntos);
              return <button key={k} onClick={()=>cambiar(k)} style={col(idioma===k,"#252860","#4f46e5")}>
                <span>{v.flag}</span><span style={{flex:1}}>{v.nombre}</span>
                <span style={{color:r.color,fontSize:"0.7rem"}}>{r.emoji} {est[k].puntos>0?est[k].puntos+" XP":"—"}</span>
              </button>;
            })}
          </div>
        </details>

        {/* Feedback */}
        {feedback&&(
          <div style={{borderBottom:"1px solid #2d3148",padding:"12px",flexShrink:0}}>
            <p style={{fontWeight:"600",color:"white",marginBottom:"8px",fontSize:"0.875rem"}}>💬 Feedback</p>
            <div style={{display:"flex",flexDirection:"column",gap:"5px",fontSize:"0.75rem"}}>
              {feedback.positivo&&<div style={{background:"#0d2b1a",border:"1px solid #1a4a2e",padding:"7px",borderRadius:"7px",color:"#86efac"}}>✅ {feedback.positivo}</div>}
              {feedback.correccion&&<div style={{background:"#2b1a0d",border:"1px solid #4a2e1a",padding:"7px",borderRadius:"7px",color:"#fdba74"}}>📝 {feedback.correccion}</div>}
              {feedback.sugerencia&&<div style={{background:"#0d1a2b",border:"1px solid #1a2e4a",padding:"7px",borderRadius:"7px",color:"#93c5fd"}}>💡 {feedback.sugerencia}</div>}
            </div>
          </div>
        )}

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #2d3148",flexShrink:0}}>
          {[["metas","🎯",`Metas (${metasOk}/12)`],["logros","🏆",`Logros (${logrosOk}/${LOGROS.length})`]].map(([t,ic,lb])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"8px",fontSize:"0.75rem",fontWeight:"500",background:"transparent",border:"none",borderBottom:`2px solid ${tab===t?"#6366f1":"transparent"}`,color:tab===t?"#818cf8":"#6b7280",cursor:"pointer"}}>
              {ic} {lb}
            </button>
          ))}
        </div>

        <div style={{flex:"1 1 0",minHeight:0,overflowY:"auto",padding:"10px",display:"flex",flexDirection:"column",gap:"5px"}}>
          {tab==="metas"&&e.metas.map(m=>(
            <div key={m.id} style={{background:m.completada?"#1a2b1a":"#252836",border:`1px solid ${m.completada?"#2d4a2d":"#2d3148"}`,padding:"9px",borderRadius:"8px",display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{flexShrink:0}}>{m.completada?"✅":"⬜"}</span>
              <span style={{fontSize:"0.75rem",flex:1,textDecoration:m.completada?"line-through":"none",color:m.completada?"#6b7280":"#d1d5db",lineHeight:"1.3"}}>{m.texto}</span>
              <span style={{fontSize:"0.75rem",fontWeight:"bold",color:"#facc15",flexShrink:0}}>+{m.pts}</span>
            </div>
          ))}
          {tab==="logros"&&LOGROS.map(l=>{
            const ok=e.logros.includes(l.id);
            return <div key={l.id} style={{background:ok?"#1a1a2e":"#252836",border:`1px solid ${ok?"#4f46e5":"#2d3148"}`,padding:"8px",borderRadius:"8px",display:"flex",alignItems:"center",gap:"8px",opacity:ok?1:0.45}}>
              <span style={{fontSize:"1.2rem",flexShrink:0}}>{l.emoji}</span>
              <div style={{minWidth:0,flex:1}}>
                <p style={{fontSize:"0.75rem",fontWeight:"bold",color:ok?"#a5b4fc":"#6b7280",margin:0}}>{l.nombre}</p>
                <p style={{fontSize:"0.7rem",color:"#6b7280",margin:0,lineHeight:"1.3"}}>{l.desc}</p>
              </div>
              {ok&&<span style={{color:"#facc15",flexShrink:0}}>⭐</span>}
            </div>;
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>

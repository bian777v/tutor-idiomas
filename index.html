<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor de Idiomas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e2e8f0;font-family:sans-serif;height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#1a1d27}
    ::-webkit-scrollbar-thumb{background:#3d4166;border-radius:3px}
    input{outline:none}
    button{cursor:pointer}
    details>summary{list-style:none}
    details>summary::-webkit-details-marker{display:none}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Tu clave ya está acá:
const API_KEY = "AIzaSyBl9ddn_h7ozAD45h5HJRXrm1_stTiC4lQ";

const IDIOMAS = {
  ingles:    { nombre: "Inglés",    flag: "🇺🇸", lang: "en-US" },
  italiano:  { nombre: "Italiano",  flag: "🇮🇹", lang: "it-IT" },
  frances:   { nombre: "Francés",   flag: "🇫🇷", lang: "fr-FR" },
  aleman:    { nombre: "Alemán",    flag: "🇩🇪", lang: "de-DE" },
  portugues: { nombre: "Portugués", flag: "🇵🇹", lang: "pt-PT" },
  japones:   { nombre: "Japonés",   flag: "🇯🇵", lang: "ja-JP" },
  chino:     { nombre: "Chino",     flag: "🇨🇳", lang: "zh-CN" },
  arabe:     { nombre: "Árabe",     flag: "🇸🇦", lang: "ar-SA" },
  catalan:   { nombre: "Catalán",   flag: "🏴",  lang: "ca-ES" },
};

const RANGOS = [
  { nombre:"Novato",  min:0,  max:299,  color:"#6b7280", emoji:"🥚" },
  { nombre:"Maestro", min:300, max:Infinity, color:"#ef4444", emoji:"👑" },
];

const getRango = pts => RANGOS.find(r => pts>=r.min && pts<=r.max) || RANGOS[0];

function App(){
  const [idioma,setIdioma]=useState("ingles");
  const [puntos, setPuntos]=useState(0);
  const [msg,setMsg]=useState("");
  const [cargando,setCargando]=useState(false);
  const [mensajes,setMensajes]=useState([]);
  const endRef=useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[mensajes]);

  const enviar=async(override)=>{
    const txt=override||msg;
    if(!txt.trim()||cargando) return;
    
    const uMsg={id:Date.now(),texto:txt,de:"usuario",hora:new Date()};
    setMensajes(prev => [...prev, uMsg]);
    setMsg("");
    setCargando(true);

    const prompt=`Eres un tutor de ${IDIOMAS[idioma].nombre}. Responde amigable en JSON: {"respuesta": "tu mensaje en ${IDIOMAS[idioma].nombre} y español"}`;

    try{
      // CAMBIO CLAVE: Usamos gemini-pro que es el más compatible
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:[{parts:[{text:prompt + " Mensaje del usuario: " + txt}]}]
        })
      });

      const data=await res.json();
      if(!res.ok) throw new Error(data.error?.message || "Error");

      const raw=data.candidates[0].content.parts[0].text.replace(/```json|```/g,"").trim();
      const p=JSON.parse(raw);
      
      setMensajes(prev => [...prev, {id:Date.now()+1, texto:p.respuesta, de:"tutor", hora:new Date()}]);
      setPuntos(prev => prev + 10);
    }catch(err){
      setMensajes(prev => [...prev, {id:Date.now()+1, texto:"❌ Error: " + err.message, de:"tutor", hora:new Date()}]);
    }finally{setCargando(false);}
  };

  const idm = IDIOMAS[idioma];
  const rng = getRango(puntos);

  return (
    <div style={{display:"flex",height:"100vh",background:"#0f1117",color:"#e2e8f0"}}>
      {/* Sidebar */}
      <div style={{width:"260px", background:"#1a1d27", padding:"20px", borderRight:"1px solid #2d3148", display:"flex", flexDirection:"column"}}>
        <h2 style={{fontSize:"1.2rem", marginBottom:"20px"}}>📚 Tutor Pro</h2>
        <div style={{flex:1, overflowY:"auto"}}>
            {Object.entries(IDIOMAS).map(([k,v])=>(
                <button key={k} onClick={()=>setIdioma(k)} style={{
                    width:"100%", padding:"10px", marginBottom:"5px", borderRadius:"8px", border:"none",
                    background: idioma===k ? "#4f46e5" : "transparent", color:"white", textAlign:"left", cursor:"pointer"
                }}>
                    {v.flag} {v.nombre}
                </button>
            ))}
        </div>
        <div style={{padding:"15px", background:"#0f1117", borderRadius:"10px", marginTop:"10px"}}>
            <p style={{fontSize:"0.8rem", color:"#9ca3af"}}>Nivel: {rng.nombre} {rng.emoji}</p>
            <p style={{fontSize:"1.2rem", fontWeight:"bold", color:"#facc15"}}>{puntos} XP</p>
        </div>
      </div>

      {/* Main Chat */}
      <div style={{flex:1, display:"flex", flexDirection:"column"}}>
        <div style={{flex:1, overflowY:"auto", padding:"20px"}}>
            {mensajes.length === 0 && (
                <div style={{textAlign:"center", marginTop:"50px"}}>
                    <div style={{fontSize:"4rem"}}>{idm.flag}</div>
                    <h2>¡Aprendamos {idm.nombre}!</h2>
                    <p style={{color:"#9ca3af"}}>Escribe algo para empezar a ganar puntos.</p>
                </div>
            )}
            {mensajes.map(m=>(
                <div key={m.id} style={{display:"flex", justifyContent: m.de==="usuario"?"flex-end":"flex-start", marginBottom:"15px"}}>
                    <div style={{
                        maxWidth:"70%", padding:"12px 16px", borderRadius:"15px",
                        background: m.de==="usuario"?"#4f46e5":"#1a1d27",
                        border: m.de==="tutor"?"1px solid #2d3148":"none"
                    }}>
                        {m.texto}
                    </div>
                </div>
            ))}
            <div ref={endRef}/>
        </div>

        <div style={{padding:"20px", background:"#1a1d27", borderTop:"1px solid #2d3148", display:"flex", gap:"10px"}}>
            <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enviar()}
                placeholder={`Escribe en ${idm.nombre}...`}
                style={{flex:1, padding:"12px", borderRadius:"10px", border:"1px solid #3d4166", background:"#0f1117", color:"white"}}/>
            <button onClick={()=>enviar()} disabled={cargando} style={{
                padding:"10px 20px", borderRadius:"10px", border:"none", background:"#4f46e5", color:"white"
            }}>
                {cargando ? "..." : "➤"}
            </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>

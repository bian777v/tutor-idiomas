<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor de Idiomas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e2e8f0;font-family:sans-serif;height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#1a1d27}
    ::-webkit-scrollbar-thumb{background:#3d4166;border-radius:3px}
    input{outline:none}
    button{cursor:pointer}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ⚠️ PONÉ TU API KEY ACÁ ADENTRO DE LAS COMILLAS:
const API_KEY =AIzaSyBl9ddn_h7ozAD45h5HJRXrm1_stTiC4lQ ;

const IDIOMAS = {
  ingles:    { nombre: "Inglés",    flag: "🇺🇸", lang: "en-US" },
  italiano:  { nombre: "Italiano",  flag: "🇮🇹", lang: "it-IT" },
  frances:   { nombre: "Francés",   flag: "🇫🇷", lang: "fr-FR" },
};

function App(){
  const [idioma, setIdioma] = useState("ingles");
  const [mensajes, setMensajes] = useState([]);
  const [msg, setMsg] = useState("");
  const [cargando, setCargando] = useState(false);

  const enviar = async () => {
    if (!msg.trim() || cargando) return;
    const nuevoMsg = { texto: msg, de: "usuario" };
    setMensajes([...mensajes, nuevoMsg]);
    setMsg("");
    setCargando(true);

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `Responde amigablemente a esto: ${msg}. En formato JSON: {"respuesta": "tu respuesta"}` }] }]
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ? data.error.message : "Error desconocido");
      
      const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
      const p = JSON.parse(raw);
      setMensajes(prev => [...prev, { texto: p.respuesta, de: "tutor" }]);
    } catch (err) {
      setMensajes(prev => [...prev, { texto: "❌ Error: " + err.message, de: "tutor" }]);
    } finally { setCargando(false); }
  };

  return (
    <div style={{display:"flex", flexDirection:"column", height:"100vh", padding:"20px"}}>
      <h2 style={{textAlign:"center", marginBottom:"20px"}}>Tutor de Idiomas 📚</h2>
      <div style={{flex:1, overflowY:"auto", background:"#1a1d27", padding:"15px", borderRadius:"10px", marginBottom:"15px"}}>
        {mensajes.map((m, i) => (
          <div key={i} style={{marginBottom:"10px", textAlign: m.de === "usuario" ? "right" : "left"}}>
            <div style={{display:"inline-block", padding:"10px", borderRadius:"10px", background: m.de === "usuario" ? "#4f46e5" : "#2d3148"}}>
              {m.texto}
            </div>
          </div>
        ))}
        {cargando && <p>Escribiendo...</p>}
      </div>
      <div style={{display:"flex", gap:"10px"}}>
        <input value={msg} onChange={e => setMsg(e.target.value)} style={{flex:1, padding:"10px", borderRadius:"5px", border:"none"}} placeholder="Escribí algo..." />
        <button onClick={enviar} style={{padding:"10px 20px", background:"#4f46e5", color:"white", border:"none", borderRadius:"5px"}}>Enviar</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor de Idiomas Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e2e8f0;font-family:sans-serif;height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#1a1d27}
    ::-webkit-scrollbar-thumb{background:#3d4166;border-radius:3px}
    input{outline:none}
    button{cursor:pointer}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ⚠️ PEGA TU CLAVE ACÁ ADENTRO:
const API_KEY = "AIzaSyBl9ddn_h7ozAD45h5HJRXrm1_stTiC4lQ";

const IDIOMAS = {
  ingles:    { nombre: "Inglés",    flag: "🇺🇸", lang: "en-US" },
  italiano:  { nombre: "Italiano",  flag: "🇮🇹", lang: "it-IT" },
  frances:   { nombre: "Francés",   flag: "🇫🇷", lang: "fr-FR" },
  aleman:    { nombre: "Alemán",    flag: "🇩🇪", lang: "de-DE" },
  portugues: { nombre: "Portugués", flag: "🇵🇹", lang: "pt-PT" },
  japones:   { nombre: "Japonés",   flag: "🇯🇵", lang: "ja-JP" },
};

const RANGOS = [
  { nombre:"Novato", min:0, max:299, color:"#6b7280", emoji:"🥚" },
  { nombre:"Aprendiz", min:300, max:699, color:"#10b981", emoji:"🌱" },
  { nombre:"Maestro", min:700, max:Infinity, color:"#ef4444", emoji:"👑" },
];

function App() {
  const [idioma, setIdioma] = useState("ingles");
  const [puntos, setPuntos] = useState(0);
  const [mensajes, setMensajes] = useState([]);
  const [msg, setMsg] = useState("");
  const [cargando, setCargando] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [mensajes]);

  const enviar = async (textoManual) => {
    const textoAEnviar = textoManual || msg;
    if (!textoAEnviar.trim() || cargando) return;

    const uMsg = { texto: textoAEnviar, de: "usuario", hora: new Date() };
    setMensajes(prev => [...prev, uMsg]);
    setMsg("");
    setCargando(true);

    const prompt = `Eres un tutor de ${IDIOMAS[idioma].nombre}. 
    Responde amigable y educativo. 
    USA ESTE FORMATO JSON: {"respuesta": "tu mensaje", "puntos": 10}
    Mensaje del usuario: ${textoAEnviar}`;

    try {
      // USANDO LA VERSION V1 QUE ES MAS ESTABLE
      const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || "Error API");

      let raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
      const p = JSON.parse(raw);
      
      setMensajes(prev => [...prev, { texto: p.respuesta, de: "tutor", hora: new Date() }]);
      if(p.puntos) setPuntos(prev => prev + p.puntos);

    } catch (err) {
      setMensajes(prev => [...prev, { texto: "❌ Error: " + err.message, de: "tutor", hora: new Date() }]);
    } finally {
      setCargando(false);
    }
  };

  return (
    <div style={{display:"flex", height:"100vh"}}>
      {/* Barra Lateral */}
      <div style={{width:"250px", background:"#1a1d27", padding:"20px", borderRight:"1px solid #2d3148"}}>
        <h3>Idiomas</h3>
        {Object.entries(IDIOMAS).map(([id, info]) => (
          <button key={id} onClick={() => setIdioma(id)} style={{
            display:"block", width:"100%", padding:"10px", marginBottom:"5px", borderRadius:"8px",
            background: idioma === id ? "#4f46e5" : "transparent", color:"white", border:"none", textAlign:"left"
          }}>
            {info.flag} {info.nombre}
          </button>
        ))}
        <div style={{marginTop:"20px", padding:"10px", background:"#0f1117", borderRadius:"10px"}}>
          <p>Puntos: <span style={{color:"#facc15"}}>{puntos} XP</span></p>
        </div>
      </div>

      {/* Area de Chat */}
      <div style={{flex:1, display:"flex", flexDirection:"column", padding:"20px"}}>
        <div style={{flex:1, overflowY:"auto", marginBottom:"20px", paddingRight:"10px"}}>
          {mensajes.map((m, i) => (
            <div key={i} style={{marginBottom:"15px", textAlign: m.de === "usuario" ? "right" : "left"}}>
              <div style={{
                display:"inline-block", padding:"12px 16px", borderRadius:"15px", 
                background: m.de === "usuario" ? "#4f46e5" : "#1a1d27", maxWidth:"70%"
              }}>
                {m.texto}
              </div>
            </div>
          ))}
          <div ref={endRef} />
        </div>

        <div style={{display:"flex", gap:"10px"}}>
          <input value={msg} onChange={e => setMsg(e.target.value)} onKeyDown={e => e.key === "Enter" && enviar()}
            style={{flex:1, padding:"15px", borderRadius:"10px", background:"#1a1d27", color:"white", border:"1px solid #2d3148"}} 
            placeholder={`Habla en ${IDIOMAS[idioma].nombre}...`} />
          <button onClick={() => enviar()} style={{padding:"0 20px", borderRadius:"10px", background:"#4f46e5", color:"white", border:"none"}}>➤</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>

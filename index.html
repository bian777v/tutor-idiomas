<!DOCTYPE html>
<html>
<head>
    <title>Chat Tutor</title>
    <style>
        body { background: #0f1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #chat { flex: 1; overflow-y: auto; border: 1px solid #2d3148; padding: 10px; margin-bottom: 10px; border-radius: 10px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; max-width: 80%; }
        .usuario { background: #4f46e5; align-self: flex-end; margin-left: auto; }
        .tutor { background: #2d3148; }
        input { padding: 10px; border-radius: 5px; border: none; width: 80%; }
        button { padding: 10px; cursor: pointer; background: #4f46e5; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Tutor de Idiomas 📚</h2>
    <div id="chat"></div>
    <div>
        <input type="text" id="userInput" placeholder="Escribí un mensaje...">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script>
        // 1. PEGA TU CLAVE ACÁ ADENTRO DE LAS COMILLAS
        const API_KEY = "AIzaSyBl9ddn_h7ozAD45h5HJRXrm1_stTiC4lQ";

        const chatDiv = document.getElementById('chat');

        async function enviar() {
            const input = document.getElementById('userInput');
            const texto = input.value;
            if (!texto) return;

            // Mostrar mensaje del usuario
            chatDiv.innerHTML += `<div class="msg usuario">${texto}</div>`;
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: texto }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    chatDiv.innerHTML += `<div class="msg tutor" style="color: #ff4444;">❌ Error: ${data.error.message}</div>`;
                } else {
                    const respuestaIA = data.candidates[0].content.parts[0].text;
                    chatDiv.innerHTML += `<div class="msg tutor">${respuestaIA}</div>`;
                }
            } catch (error) {
                chatDiv.innerHTML += `<div class="msg tutor" style="color: #ff4444;">❌ Error crítico: No se pudo conectar con Google</div>`;
            }
            
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
    </script>
</body>
</html>
